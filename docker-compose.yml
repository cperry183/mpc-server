services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mpc-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=change-this-to-a-long-random-string
      - SESSION_TTL_SECONDS=3600
      - MAX_PAYLOAD_BYTES=65536
      - XREAD_BLOCK_MS=20000
    depends_on:
      - redis
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz').read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  job-leads:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "rss_job_watcher.py"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - POLL_SECONDS=21600
      - SEEN_TTL_SECONDS=1209600
      - RSS_URLS=PUT_FEED_URLS_HERE_COMMA_SEPARATED
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=your_gmail@gmail.com
      - SMTP_PASS=YOUR_APP_PASSWORD
      - MAIL_FROM=your_gmail@gmail.com
      - MAIL_TO=your_gmail@gmail.com
    depends_on:
      - redis

  dice-leads:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "dice_job_watcher.py"]
    environment:
      - IMAP_HOST=imap.gmail.com
      - IMAP_USER=your_gmail@gmail.com
      - IMAP_PASS=your_google_app_password
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=your_gmail@gmail.com
      - SMTP_PASS=your_google_app_password
      - MAIL_TO=your_gmail@gmail.com
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
